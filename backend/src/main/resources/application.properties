server.port=8080
spring.application.name=web-to-pdf

# ─── Gemini AI (primary) ──────────────────────────────────────────────────────
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-1.5-flash}
gemini.api-url=https://generativelanguage.googleapis.com/v1beta/models

# ─── MySQL Database ────────────────────────────────────────────────────────────
# Set DB_URL / DB_USER / DB_PASSWORD environment variables — see .env.example
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/link2paper?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ─── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── Scraper ──────────────────────────────────────────────────────────────────
scraper.timeout-ms=10000

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.webtopdf=DEBUG
